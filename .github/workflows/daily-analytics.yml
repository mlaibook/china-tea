name: Daily analytics report

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write GA credentials
        if: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/ga"
          printf '%s' '${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/ga/service-account.json"
          {
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/ga/service-account.json"
            echo "GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}"
            echo "GA4_MEASUREMENT_ID=${{ secrets.GA4_MEASUREMENT_ID }}"
          } > .env.analytics

      - name: Update analytics report
        run: bash scripts/update_analytics_report.sh

      - name: Commit analytics refresh
        run: |
          git config user.name "openclaw-bot"
          git config user.email "openclaw-bot@users.noreply.github.com"
          git add analytics.html data/ga/report.json .env.analytics || true
          if git diff --cached --quiet; then
            echo "No analytics changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh analytics report"
          git push
