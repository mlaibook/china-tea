  <main class="page"><article><h1>茶文化历史</h1><p>这里收录中国茶的历史、制度、观念与生活方式长文。最新更新聚焦顾渚贡茶院，回看陆羽、《茶经》与唐代贡茶制度如何共同塑造中国茶的“源头”想象。</p><section class="card-grid"><a class="card" href="../history/guzhu-tribute-tea-yard.html"><img src="../../assets/img/photos/longjing-plantation-v2.jpg" alt="山坡上的茶园延展开去" /><h2>顾渚贡茶院为什么值得在今天重新讲</h2><p>从陆羽、《茶经》、唐代贡茶制度到当代“茶源头”想象，重看茶如何进入国家与文明叙事。</p></a><a class="card" href="../history/wanli-tea-road.html"><img src="../../assets/img/photos/chengdu-teahouse-v1.jpg" alt="成都茶馆里的日常饮茶场景" /><h2>万里茶道再度升温</h2><p>从晋商、恰克图到世界贸易网络，重看茶如何走出产地。</p></a><a class="card" href="../history/tea-intangible-heritage-revival.html"><img src="../../assets/img/photos/wikimedia-huxinting-teahouse-v1.jpg" alt="传统茶空间与建筑" /><h2>茶申遗之后，年轻人在复兴什么</h2><p>从非遗名录到当代茶生活，观察传统如何被重新翻译回日常。</p></a></section></article></main>
