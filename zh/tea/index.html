  <main class="wrap"><section class="subhero"><p class="eyebrow">栏目</p><h1>茶叶</h1><p class="lede">这个栏目不再只从绿茶展开，而是逐步把中国茶的主要风格谱系拉开：既有龙井、信阳毛尖这样的春季绿茶，也会进入凤凰单丛、岩茶、白茶与更多能代表产区、工艺和品饮分野的重要茶类。</p></section><div class="content-stream"><figure class="photo"><img src="assets/img/photos/longjing-dried.jpg" alt="龙井干茶" /><figcaption>龙井干茶的扁平外形，与其炒制和压扁工艺高度相关。</figcaption></figure><figure class="photo"><img src="assets/img/photos/wuyi-oolong-wikimedia-v1.jpg" alt="乌龙茶干茶与茶汤" /><figcaption>从绿茶转入乌龙茶时，观察重点会从嫩度与鲜爽，扩展到香型、山场、做青与焙火。</figcaption></figure><section class="feature-card"><h2>本栏重点文章</h2><p>如果你想先理解中国名优绿茶，可以从<a href="longjing.html">龙井</a>和<a href="xinyang-maojian.html">信阳毛尖</a>读起；如果想跳进另一套更高香、更讲工夫冲泡与香型分化的体系，下一篇很适合读<a href="duck-shit-aroma.html">鸭屎香单丛</a>。</p><p><a class="btn" href="duck-shit-aroma.html">阅读鸭屎香专题</a></p></section></div></main>
